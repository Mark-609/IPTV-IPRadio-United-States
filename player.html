body{

display:flex;
align-items:center;

overflow:hidden;
}

#player-frame{

height:min(430px,calc(100% - 8px));
min-width:320px;
min-height:180px;
max-width:100%;
max-height:100%;
resize:both;
overflow:hidden;
background:#000;
border:1px solid #2a2d3b;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,.35);
}

video{
width:100%;
height:100%;
object-fit:contain;
display:block;
background:#000;
}

/* INFO */

#info{
background:#12131a;
padding:10px 20px;
border-top:1px solid #222;
display:grid;
grid-template-columns:110px 1fr 110px;
align-items:center;
gap:16px;
}

#title{
display:block;
margin:0;
text-align:left;
justify-self:stretch;
}

#equalizer{
display:none;
align-items:flex-end;
gap:3px;
height:28px;
min-width:90px;
justify-self:start;
}

#equalizer.active{
display:flex;
}

.eq-bar{
width:4px;
height:10px;
background:#24e38a;
border-radius:2px;
transform-origin:bottom;
transform:scaleY(0.25);
transition:transform .08s linear;
}

/* GUIDE ROWS */

#guide{
flex:1;
overflow:auto;
padding:15px;
}

.section{
margin-bottom:25px;
}

.section h2{
margin:0 0 10px 5px;
font-size:18px;
color:#aaa;
}

.row{
display:flex;
gap:12px;
overflow-x:auto;
padding:5px;
}

.card{
min-width:150px;
height:90px;
background:#1e2029;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
cursor:pointer;
text-align:center;
padding:6px;
font-size:13px;
}

.card .fallback-icon{
font-size:26px;
line-height:1;
margin-bottom:4px;
display:block;
}

.card .fallback-text{
font-size:12px;
line-height:1.2;
}

.card img{
max-width:90%;
max-height:70%;
}

.card:hover{
background:#2a2d3b;
}

/* MOBILE */

@media(max-width:800px){

#sidebar{
width:180px;
}

#player-frame{
resize:none;
width:calc(100% - 40px);
height:min(260px,calc(100% - 8px));
}

.card{
min-width:120px;
}

}

</style>

function normalizeKey(value){
return (value||"").toLowerCase().replace(/[^a-z0-9]/g,"")
}

const NPO_TV_LOGOS={
"npo1":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/NPO_1_logo_2014.svg/3840px-NPO_1_logo_2014.svg.png",
"npo2":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/NPO_2_logo_2014.svg/1280px-NPO_2_logo_2014.svg.png",
"npo3":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/NPO_3_logo_2014.svg/3840px-NPO_3_logo_2014.svg.png",
"zappelin":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/01/NPO_Zappelin_logo_2018.svg/960px-NPO_Zappelin_logo_2018.svg.png",
"zapp":"https://upload.wikimedia.org/wikipedia/commons/2/2d/NPO_Zapp_logo_2018.png"
}

function getAmsterdamDayAndMinutes(){
const parts=new Intl.DateTimeFormat("en-GB",{
timeZone:"Europe/Amsterdam",
weekday:"short",
hour:"2-digit",
minute:"2-digit",
hour12:false
}).formatToParts(new Date())
const pick=t=>parts.find(p=>p.type===t)?.value||""
const day=pick("weekday").toLowerCase().slice(0,3)
const hour=parseInt(pick("hour"),10)
const minute=parseInt(pick("minute"),10)
return {
day,
minutes:(Number.isFinite(hour)?hour:0)*60 + (Number.isFinite(minute)?minute:0)
}
}

function getNpo3TimeLogo(){
const t=getAmsterdamDayAndMinutes()
const isWeekend=t.day==="sat" || t.day==="sun"
const startMorning=5*60+30
const switchToZappWeekday=15*60
const switchToZappWeekend=8*60+30
const endZapp=19*60+20

if(!isWeekend && t.minutes>=startMorning && t.minutes<switchToZappWeekday) return NPO_TV_LOGOS.zappelin
if(isWeekend && t.minutes>=startMorning && t.minutes<switchToZappWeekend) return NPO_TV_LOGOS.zappelin
if(!isWeekend && t.minutes>=switchToZappWeekday && t.minutes<endZapp) return NPO_TV_LOGOS.zapp
if(isWeekend && t.minutes>=switchToZappWeekend && t.minutes<endZapp) return NPO_TV_LOGOS.zapp
return NPO_TV_LOGOS.npo3
}

function getNpoTvLogo(name){
const key=normalizeKey(name)
if(!key.includes("npo")) return ""
if(key.includes("npo1")) return NPO_TV_LOGOS.npo1
if(key.includes("npo2")) return NPO_TV_LOGOS.npo2
if(key.includes("npo3")) return getNpo3TimeLogo()
return ""
}

function getNpoRadioLogo(name){
const key=normalizeKey(name)
if(!key) return ""
if(NPO_RADIO_LOGOS[key]) return NPO_RADIO_LOGOS[key]
if(key.includes("radio1")) return NPO_RADIO_LOGOS.npor1
if(key.includes("radio2")) return NPO_RADIO_LOGOS.npor2
if(key.includes("radio5")) return NPO_RADIO_LOGOS.npor5
if(key.includes("3fm")) return NPO_RADIO_LOGOS.npo3fm
if(key.includes("klassiek")) return NPO_RADIO_LOGOS.npoklassiek
if(key.includes("soulandjazz") || key.includes("souljazz") || (key.includes("soul") && key.includes("jazz"))) return NPO_RADIO_LOGOS.nposoulandjazz
if(key.includes("sterrennl")) return NPO_RADIO_LOGOS.nposterrennl
if(key.includes("campus")) return NPO_RADIO_LOGOS.npocampus
if(key.includes("funx")) return NPO_RADIO_LOGOS.funx
return ""
}

function getRegionaleRadioLogo(name){
const key=normalizeKey(name)
if(!key) return ""
if(REGIONALE_RADIO_LOGOS[key]) return REGIONALE_RADIO_LOGOS[key]
if(key.includes("fryslan") || key.includes("frysln") || key.includes("friesland")) return REGIONALE_RADIO_LOGOS.omroepfryslan
if(key.includes("drenthe")) return REGIONALE_RADIO_LOGOS.rtvdrenthe
if(key.includes("oost")) return REGIONALE_RADIO_LOGOS.rtvoost
if(key.includes("flevoland")) return REGIONALE_RADIO_LOGOS.omroepflevoland
if(key.includes("gelderland")) return REGIONALE_RADIO_LOGOS.omroepgelderland
if(key.includes("west")) return REGIONALE_RADIO_LOGOS.omroepwest
if(key.includes("utrecht")) return REGIONALE_RADIO_LOGOS.rtvutrecht
if(key.includes("rijnmond")) return REGIONALE_RADIO_LOGOS.rtvrijnmond
if(key.includes("noord")) return REGIONALE_RADIO_LOGOS.rtvnoord
if(key.includes("zeeland")) return REGIONALE_RADIO_LOGOS.omroepzeeland
return ""
}

function toDisplayText(value){
return (value || "").replace(/;/g," - ")
}

function iconForGroup(group){
if(group==="NPO Radio") return "&#128251;"
if(group==="Regionale Radio" || group==="Regionaal Radio") return "&#128225;"
return "&#128250;"
}

function setCardFallback(card,ch){
card.textContent=toDisplayText(ch.name)
}

function isRadioGroup(group){
return group==="NPO Radio" || group==="Regionale Radio" || group==="Regionaal Radio"
}

function getHostIconUrl(streamUrl){
try{
const host=new URL(streamUrl).hostname
if(!host) return null
return `https://icons.duckduckgo.com/ip3/${host}.ico`
}catch(e){
return null
}
}

function getGroupIconUrl(group){
if(isRadioGroup(group)){
return "https://api.iconify.design/mdi/radio.svg?color=%23ffffff"
}
return "https://api.iconify.design/mdi/television-classic.svg?color=%23ffffff"
}

function appendImageWithFallbacks(card,ch){
const candidates=[]

let resolvedLogo=ch.logo
if(ch.group==="NPO"){
resolvedLogo=getNpoTvLogo(ch.name) || ch.logo
}
if(resolvedLogo) candidates.push(resolvedLogo)

const hostIcon=getHostIconUrl(ch.url)
if(hostIcon) candidates.push(hostIcon)

candidates.push(getGroupIconUrl(ch.group))

const img=document.createElement("img")
img.alt=toDisplayText(ch.name)
img.loading="lazy"
img.referrerPolicy="no-referrer"

let idx=0
img.onerror=()=>{
idx++
if(idx<candidates.length){
img.src=candidates[idx]
return
}
setCardFallback(card,ch)
}

img.src=candidates[idx]
card.appendChild(img)
}

function ensureEqualizerBars(){
if(equalizer.children.length) return
for(let i=0;i<16;i++){
const bar=document.createElement("span")
bar.className="eq-bar"
equalizer.appendChild(bar)
}
}

function isRadioChannel(ch){
return !!(ch && isRadioGroup(ch.group))
}

function initAudioAnalyser(){
if(analyser || analyserSource===false) return
try{
audioCtx=audioCtx || new (window.AudioContext || window.webkitAudioContext)()
analyser=audioCtx.createAnalyser()
analyser.fftSize=64
analyserData=new Uint8Array(analyser.frequencyBinCount)
if(!analyserSource){
analyserSource=audioCtx.createMediaElementSource(video)
analyserSource.connect(analyser)
analyser.connect(audioCtx.destination)
}
}catch(e){
analyserSource=false
analyser=null
analyserData=null
}
}

function stopEqualizer(){
if(eqAnimationId){
cancelAnimationFrame(eqAnimationId)
eqAnimationId=null
}
for(const bar of equalizer.children){
bar.style.transform="scaleY(0.25)"
}
}

function animateEqualizer(){
if(!equalizer.classList.contains("active")) return

const bars=equalizer.children

if(analyser && analyserData){
analyser.getByteFrequencyData(analyserData)
for(let i=0;i<bars.length;i++){
const v=analyserData[i%analyserData.length]/255
const pulse=0.22 + Math.random()*0.25
const scale=Math.max(pulse,v*1.3)
bars[i].style.transform=`scaleY(${scale.toFixed(3)})`
}
}else{
for(let i=0;i<bars.length;i++){
const base=video.paused ? 0.2 : (0.25+Math.random()*0.95)
bars[i].style.transform=`scaleY(${base.toFixed(3)})`
}
}

eqAnimationId=requestAnimationFrame(animateEqualizer)
}

function updateEqualizerState(){
const show=isRadioChannel(currentChannel)
equalizer.classList.toggle("active",show)
if(!show){
stopEqualizer()
return
}
ensureEqualizerBars()
initAudioAnalyser()
if(audioCtx && audioCtx.state==="suspended"){
audioCtx.resume().catch(()=>{})
}
if(video.paused || video.ended){
stopEqualizer()
return
}
if(!eqAnimationId){
animateEqualizer()
}
}

video.addEventListener("play",updateEqualizerState)
video.addEventListener("playing",updateEqualizerState)
video.addEventListener("pause",updateEqualizerState)
video.addEventListener("ended",updateEqualizerState)
video.addEventListener("emptied",updateEqualizerState)
video.addEventListener("error",updateEqualizerState)

/* PLAYER */

function play(ch){

currentChannel=ch
title.textContent=toDisplayText(ch.name)
updateEqualizerState()

if(hls){
hls.destroy()
hls=null
}

video.src=""

if(ch.url.includes(".m3u8") && Hls.isSupported()){

hls=new Hls()
hls.loadSource(ch.url)
hls.attachMedia(video)
hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play().catch(()=>{})
})

}else{

video.src=ch.url
video.play().catch(()=>{})

}

}

/* PARSE M3U */

function parseM3U(data,groupOverride=null,tab="ALL"){

const lines=data.split("\n")

let name="",logo="",group="TV"

for(let line of lines){

line=line.trim()

if(line.startsWith("#EXTINF")){

name=(line.split(",")[1]||"").trim()
name=toDisplayText(name)

// Rename only the radio channel; TV keeps its original name.
if(group==="Regionale Radio" || group==="Regionaal Radio") {
  if(/rtv\s*utrecht/i.test(name)) name="Radio M Utrecht"
}


if(/^\++/.test(name)){
name=""
continue
}


const lg=line.match(/tvg-logo="([^"]+)"/)
if(lg) logo=lg[1]

const gr=line.match(/group-title="([^"]+)"/)
if(gr) group=gr[1]
group=toDisplayText(group)

if(groupOverride) group=groupOverride
if(groupOverride) group=toDisplayText(group)

}

else if(line.startsWith("http") && name){

let finalLogo=logo
if(group==="NPO Radio"){
finalLogo=getNpoRadioLogo(name) || logo
}
if(group==="Regionale Radio" || group==="Regionaal Radio" || group==="Regionaal TV"){
finalLogo=getRegionaleRadioLogo(name) || logo
}
if(group==="Regionaal TV" && /rtv\s*utrecht/i.test(name)){
finalLogo="https://careers.recruiteecdn.com/image/upload/q_auto,f_auto,w_400,c_limit/production/images/BAH-/WLb-KHrFfOSY.png"
}
if(group==="NPO"){
finalLogo=getNpoTvLogo(name) || logo
}

channels.push({
name,
logo:finalLogo,
group,
url:line,
tab
})

name=""

}

}

}

/* BUILD GUIDE */

function buildGuide(){

guide.innerHTML=""

const visibleChannels=activeTab==="ALL" ? channels : channels.filter(c=>c.tab===activeTab)
const groups={}

visibleChannels.forEach(c=>{
if(!groups[c.group]) groups[c.group]=[]
groups[c.group].push(c)
})

/* PRIORITY ORDER */

const order=[
"ESPN Radio",
"NPR Radio",
"NBC",
"CBS",
"ABC",
"FOX",
"PBS",
"USA",
"World"
]

Object.keys(groups)
.sort((a,b)=>{

const ia=order.indexOf(a)
const ib=order.indexOf(b)

if(ia!==-1 && ib!==-1) return ia-ib
if(ia!==-1) return -1
if(ib!==-1) return 1

return a.localeCompare(b)

})
.forEach(group=>{

const sec=document.createElement("div")
sec.className="section"

const title=document.createElement("h2")
title.textContent=group

sec.appendChild(title)

const row=document.createElement("div")
row.className="row"

groups[group].slice(0,30).forEach(ch=>{

const card=document.createElement("div")
card.className="card"

appendImageWithFallbacks(card,ch)

card.onclick=()=>play(ch)

row.appendChild(card)

})

sec.appendChild(row)

guide.appendChild(sec)

})

}

/* SEARCH */

document.getElementById("search").oninput=e=>{

const q=e.target.value.toLowerCase()

results.innerHTML=""

if(!q) return

(activeTab==="ALL" ? channels : channels.filter(c=>c.tab===activeTab))
.filter(c=>c.name.toLowerCase().includes(q))
.slice(0,80)
.forEach(ch=>{

const d=document.createElement("div")
d.className="result"
d.textContent=toDisplayText(ch.name)

d.onclick=()=>play(ch)

results.appendChild(d)

})

}


document.querySelectorAll(".tab-btn").forEach(btn=>{
btn.onclick=()=>{
activeTab=btn.dataset.tab||"ALL"
document.querySelectorAll(".tab-btn").forEach(x=>x.classList.toggle("active",x===btn))
buildGuide()
results.innerHTML=""
document.getElementById("search").value=""
}
})
const langToggle=document.getElementById("lang-toggle")
if(langToggle){
  langToggle.value=currentLang
  langToggle.onchange=e=>setLanguage(e.target.value)
}
setLanguage("en")

/* START */

load()

</script>

</body>
</html>
